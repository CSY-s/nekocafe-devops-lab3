groups:
  - name: nekocafe.rules
    rules:
      - alert: NekoCafeHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: NekoCafe error rate is above 1%
      - alert: NekoCafeHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: NekoCafe p95 latency is above 500ms
      - alert: NekoCafePodRestarting
        expr: increase(kube_pod_container_status_restarts_total[10m]) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: NekoCafe pod restarted more than twice in 10 minutes
