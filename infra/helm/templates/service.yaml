apiVersion: v1
kind: Service
metadata:
  name: {{ include "nekocafe.fullname" . }}-reservation
  labels:
    app.kubernetes.io/component: reservation
spec:
  selector:
    app.kubernetes.io/component: reservation
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nekocafe.fullname" . }}-member
  labels:
    app.kubernetes.io/component: member
spec:
  selector:
    app.kubernetes.io/component: member
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nekocafe.fullname" . }}-frontend
  labels:
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
