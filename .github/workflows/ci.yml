name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nekocafe

jobs:
  quality:
    name: Lint and Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/reservation/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            services/member/package-lock.json
            services/frontend/package-lock.json

      - name: Lint
        run: make lint

      - name: Unit Test
        run: make test

  sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript,python

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v3

  build-scan-test:
    name: Build Scan and Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Images
        run: docker compose build

      - name: Scan Reservation Image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: nekocafe/reservation:local
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan Member Image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: nekocafe/member:local
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: nekocafe/frontend:local
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Integration Test
        run: |
          docker compose up -d --no-build

          for url in \
            http://localhost:8080 \
            http://localhost:8081/healthz \
            http://localhost:8082/healthz
          do
            for i in {1..30}; do
              if curl -fsS "$url" > /dev/null; then
                echo "$url is ready"
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "$url did not become ready in time"
                docker compose ps
                docker compose logs --tail=100
                exit 1
              fi

              sleep 2
            done
          done

          curl -fsS http://localhost:8081/reservations
          curl -fsS http://localhost:8082/members/M001

      - name: Cleanup
        if: always()
        run: docker compose down -v

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - sast
      - build-scan-test
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Images
        run: docker compose build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Images
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for service in reservation member frontend; do
            docker tag nekocafe/${service}:local ${IMAGE_PREFIX}/${service}:${IMAGE_TAG}
            docker push ${IMAGE_PREFIX}/${service}:${IMAGE_TAG}
          done

  pr-summary:
    name: PR Metrics Comment
    runs-on: ubuntu-latest
    needs:
      - quality
      - sast
      - build-scan-test
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - name: Comment CI Summary
        uses: actions/github-script@v7
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          SAST_RESULT: ${{ needs.sast.result }}
          BUILD_SCAN_TEST_RESULT: ${{ needs.build-scan-test.result }}
        with:
          script: |
            const body = [
              '### NekoCafe CI 指标',
              `- 质量检查：${process.env.QUALITY_RESULT}`,
              `- SAST 静态扫描：${process.env.SAST_RESULT}`,
              `- 构建 / Trivy / 集成测试：${process.env.BUILD_SCAN_TEST_RESULT}`,
              '- 覆盖率：PoC unit/smoke checks passed',
              '- HIGH/CRITICAL 漏洞：Trivy gate enabled',
              '- 镜像发布：仅 main 分支 push 后执行'
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
