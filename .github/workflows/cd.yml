name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  RELEASE_NAME: nekocafe
  NAMESPACE: nekocafe-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: nekocafe-dev
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        run: helm lint ./infra/helm

      - name: Render dev release
        run: |
          helm template $RELEASE_NAME ./infra/helm \
            --namespace $NAMESPACE \
            -f ./infra/helm/values-dev.yaml \
            --set image.tag=${{ github.sha }} \
            > rendered-dev.yaml

          grep -nE "image:|canary\.nekocafe\.io" rendered-dev.yaml | head -n 20

      - name: Canary 5 percent
        run: |
          helm template $RELEASE_NAME ./infra/helm \
            --namespace $NAMESPACE \
            -f ./infra/helm/values-dev.yaml \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --set image.tag=${{ github.sha }} \
            > rendered-canary.yaml

          grep -nE "image:|canary\.nekocafe\.io" rendered-canary.yaml | head -n 20

      - name: Health Gate
        run: |
          echo "Query Prometheus: p95 latency <= 500ms and error rate <= 1%"
          echo "Course demo mode: health gate passed after canary render verification."

      - name: Promote 100 percent
        run: |
          helm template $RELEASE_NAME ./infra/helm \
            --namespace $NAMESPACE \
            -f ./infra/helm/values-dev.yaml \
            --set canary.enabled=false \
            --set canary.weight=0 \
            --set image.tag=${{ github.sha }} \
            > rendered-promote.yaml

          grep -nE "image:|canary\.nekocafe\.io" rendered-promote.yaml | head -n 20

      - name: Auto Rollback Plan
        if: failure()
        run: |
          echo "Demo rollback command:"
          echo "helm rollback $RELEASE_NAME --namespace $NAMESPACE"
